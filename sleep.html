<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Off — Sleep Timer</title>
    <meta name="description" content="Rain and brown noise that fades to silence. Set a timer, close your eyes. The sounds handle the rest.">
    <meta property="og:title" content="Drift Off — Sleep Timer">
    <meta property="og:description" content="Ambient sounds that fade to silence while you fall asleep.">
    <meta property="og:image" content="https://nowherelabs.dev/brand/banner.png">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #04040a; --text: #d4d0c8; --text-dim: #1e1c18; --accent: #6a7a8a; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .sleep { text-align: center; max-width: 400px; padding: 24px; }

        .title {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 6px;
            color: var(--text-dim);
            margin-bottom: 48px;
        }

        .timer-display {
            font-size: 64px;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 8px;
            transition: opacity 2s;
        }

        .timer-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .duration-picker {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .dur-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.3);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dur-btn:hover { border-color: rgba(106,122,138,0.3); color: rgba(255,255,255,0.5); }
        .dur-btn.active { border-color: var(--accent); color: var(--accent); }

        .start-btn {
            background: var(--accent);
            border: none;
            color: var(--bg);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 12px 32px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 32px;
        }
        .start-btn:hover { box-shadow: 0 0 20px rgba(106,122,138,0.2); }

        .sound-picker {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .sound-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sound-btn:hover { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
        .sound-btn.active { border-color: var(--accent); color: var(--accent); }

        .credit {
            font-family: 'Space Mono', monospace;
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-top: 48px;
        }
        .credit a { color: var(--text-dim); text-decoration: none; }
        .credit a:hover { color: rgba(255,255,255,0.3); }

        .fading { animation: fadeBody 10s ease-out forwards; }
        @keyframes fadeBody { to { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="sleep">
        <p class="title">DRIFT OFF</p>

        <div class="timer-display" id="timer">30:00</div>
        <p class="timer-label" id="label">sounds fade to silence as you fall asleep</p>

        <div class="duration-picker">
            <button class="dur-btn" data-min="15">15 min</button>
            <button class="dur-btn active" data-min="30">30 min</button>
            <button class="dur-btn" data-min="45">45 min</button>
            <button class="dur-btn" data-min="60">60 min</button>
        </div>

        <div class="sound-picker">
            <button class="sound-btn active" data-sound="rain">rain</button>
            <button class="sound-btn" data-sound="brown">brown noise</button>
            <button class="sound-btn" data-sound="ocean">ocean</button>
            <button class="sound-btn" data-sound="fire">fire</button>
        </div>

        <button class="start-btn" id="start">DRIFT OFF</button>

        <p class="credit">a <a href="https://nowherelabs.dev">nowhere labs</a> project</p>
    </div>

    <script>
    let audioCtx, source, gain;
    let duration = 30 * 60;
    let remaining = duration;
    let running = false;
    let interval;
    let selectedSound = 'rain';

    // Duration picker
    document.querySelectorAll('.dur-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (running) return;
            document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            duration = parseInt(btn.dataset.min) * 60;
            remaining = duration;
            updateDisplay();
        });
    });

    // Sound picker
    document.querySelectorAll('.sound-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (running) return;
            document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSound = btn.dataset.sound;
        });
    });

    function updateDisplay() {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        document.getElementById('timer').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        document.title = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} — Drift Off`;
    }

    function createNoise(ctx) {
        const bufferSize = ctx.sampleRate * 2;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        src.loop = true;
        return src;
    }

    function startSound() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gain = audioCtx.createGain();
        gain.gain.value = 0.5;
        gain.connect(audioCtx.destination);

        const filter = audioCtx.createBiquadFilter();

        if (selectedSound === 'rain') {
            source = createNoise(audioCtx);
            filter.type = 'bandpass';
            filter.frequency.value = 800;
            filter.Q.value = 0.5;
        } else if (selectedSound === 'brown') {
            source = createNoise(audioCtx);
            filter.type = 'lowpass';
            filter.frequency.value = 200;
        } else if (selectedSound === 'ocean') {
            source = createNoise(audioCtx);
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            // LFO for wave-like modulation
            const lfo = audioCtx.createOscillator();
            lfo.frequency.value = 0.1;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 200;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);
            lfo.start();
        } else if (selectedSound === 'fire') {
            source = createNoise(audioCtx);
            filter.type = 'highpass';
            filter.frequency.value = 4000;
            gain.gain.value = 0.2;
        }

        source.connect(filter);
        filter.connect(gain);
        source.start();
    }

    document.getElementById('start').addEventListener('click', () => {
        if (running) {
            // Stop
            running = false;
            clearInterval(interval);
            if (source) source.stop();
            document.getElementById('start').textContent = 'DRIFT OFF';
            document.getElementById('label').textContent = 'sounds fade to silence as you fall asleep';
            document.body.classList.remove('fading');
            remaining = duration;
            updateDisplay();
            return;
        }

        running = true;
        startSound();
        document.getElementById('start').textContent = 'STOP';
        document.getElementById('label').textContent = 'drifting...';

        // Start fade 5 minutes before end
        const fadeStart = Math.max(duration - 300, duration * 0.8);

        interval = setInterval(() => {
            remaining--;
            updateDisplay();

            // Gradual volume fade in the last portion
            if (remaining <= duration - fadeStart) {
                const fadeProgress = 1 - (remaining / (duration - fadeStart));
                gain.gain.linearRampToValueAtTime(0.5 * (1 - fadeProgress), audioCtx.currentTime + 1);
            }

            // Dim the display as time passes
            if (remaining < 60) {
                document.body.classList.add('fading');
            }

            if (remaining <= 0) {
                clearInterval(interval);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 10);
                setTimeout(() => {
                    if (source) source.stop();
                    document.getElementById('timer').textContent = 'goodnight';
                    document.getElementById('label').textContent = '';
                    document.title = 'goodnight — Drift Off';
                    running = false;
                    // Track completed sleep session
                    if (window.nwlTrack) {
                        window.nwlTrack('sleep_complete', { sound: selectedSound, duration: duration / 60 });
                    }
                }, 10000);
            }
        }, 1000);
    });

    updateDisplay();
    </script>
    <script src="nav.js" defer></script>
    <script src="track.js" data-project="sleep"></script>
</body>
</html>
