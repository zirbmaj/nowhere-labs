<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowhere Labs — Team Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #06060a; --card: #0c0c14; --text: #d4d0c8; --dim: #2e2c28; --accent: #7a8a6a; --border: rgba(255,255,255,0.04); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 24px; }
        h1 { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 6px; color: var(--dim); margin-bottom: 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .card-title { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--dim); margin-bottom: 12px; }
        .card-value { font-size: 32px; font-weight: 200; margin-bottom: 4px; }
        .card-sub { font-size: 11px; color: var(--dim); }
        .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.up { background: var(--accent); }
        .dot.down { background: #c47a7a; }
        .product-name { color: var(--dim); width: 100px; font-family: 'Space Mono', monospace; font-size: 10px; }
        .response-time { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--dim); }
        .chat-msg { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; padding: 8px; border-left: 2px solid var(--border); }
        .chat-sender { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--accent); }
        .chat-time { font-size: 9px; color: var(--dim); }
        .refresh { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--dim); text-align: left; padding: 8px 0; border-bottom: 1px solid var(--border); }
        td { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <h1>NOWHERE LABS — TEAM DASHBOARD</h1>

    <div class="grid">
        <div class="card">
            <div class="card-title">TOTAL EVENTS</div>
            <div class="card-value" id="total-events">...</div>
            <div class="card-sub" id="events-sub">loading</div>
        </div>
        <div class="card">
            <div class="card-title">MIXERS TODAY</div>
            <div class="card-value" id="mixers-today">...</div>
            <div class="card-sub">unique drift sessions with interactions</div>
        </div>
        <div class="card">
            <div class="card-title">SUPPORTERS</div>
            <div class="card-value" id="supporters">...</div>
            <div class="card-sub" id="tips-sub">loading</div>
        </div>
        <div class="card">
            <div class="card-title">DISCOVER MIXES</div>
            <div class="card-value" id="mix-count">...</div>
            <div class="card-sub" id="mix-sub">loading</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title">PRODUCT STATUS</div>
            <div id="heartbeat">loading...</div>
        </div>
        <div class="card">
            <div class="card-title">TRENDING LAYERS</div>
            <div id="trending">loading...</div>
        </div>
        <div class="card">
            <div class="card-title">RECENT CHAT</div>
            <div id="recent-chat">loading...</div>
        </div>
        <div class="card">
            <div class="card-title">MIX OF THE DAY</div>
            <div id="mix-of-day">loading...</div>
        </div>
    </div>

    <p class="refresh" id="refresh">last updated: loading...</p>

    <script>
    const SB = 'https://lxecuywjwasxijxgnutn.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZWN1eXdqd2FzeGlqeGdudXRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDM3OTIsImV4cCI6MjA4OTcxOTc5Mn0.Wyq_doDaRZ7EfdpwM2W0_BNtaVI47yN-4cy4yTWl7jo';
    const H = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' };

    async function rpc(name) {
        const r = await fetch(`${SB}/rest/v1/rpc/${name}`, { method: 'POST', headers: H, body: '{}' });
        return r.json();
    }
    async function query(table, params = '') {
        const r = await fetch(`${SB}/rest/v1/${table}?${params}`, { headers: H });
        return r.json();
    }

    async function loadAll() {
        // Total events
        const total = await rpc('get_event_count');
        document.getElementById('total-events').textContent = total.toLocaleString();
        document.getElementById('events-sub').textContent = 'all time, bot-filtered';

        // Mixers today
        const mixers = await rpc('get_mixers_today');
        document.getElementById('mixers-today').textContent = mixers;

        // Supporters
        const support = await rpc('get_total_support');
        document.getElementById('supporters').textContent = support.supporters || 0;
        document.getElementById('tips-sub').textContent = `$${((support.total_tips || 0) / 100).toFixed(2)} total tips`;

        // Discover mixes
        const mixes = await query('published_mixes', 'select=id&order=id.desc&limit=1');
        const topMix = await rpc('get_mix_of_the_day');
        document.getElementById('mix-count').textContent = mixes.length > 0 ? mixes[0].id : '0';
        document.getElementById('mix-sub').textContent = topMix.name ? `top: ${topMix.name}` : '';

        // Heartbeat
        const hb = await query('heartbeat', 'select=id,status,response_ms,last_checked&order=id');
        document.getElementById('heartbeat').innerHTML = hb.map(p =>
            `<div class="status-row"><span class="dot ${p.status}"></span><span class="product-name">${p.id}</span><span class="response-time">${p.response_ms}ms</span></div>`
        ).join('');

        // Trending
        const layers = await rpc('get_trending_layers');
        document.getElementById('trending').innerHTML = (layers || []).slice(0, 8).map(l =>
            `<div class="status-row"><span class="product-name">${l.layer || l.name}</span><span class="response-time">${l.count}</span></div>`
        ).join('');

        // Recent chat
        const msgs = await query('chat_messages', 'select=sender,message,created_at&order=created_at.desc&limit=5');
        document.getElementById('recent-chat').innerHTML = msgs.map(m => {
            const ago = Math.round((Date.now() - new Date(m.created_at).getTime()) / 60000);
            return `<div class="chat-msg"><span class="chat-sender">${m.sender}</span> <span class="chat-time">${ago}m ago</span><br>${m.message.slice(0, 80)}</div>`;
        }).join('') || '<div class="card-sub">no recent messages</div>';

        // Mix of day
        if (topMix.name) {
            const layers = Object.keys(topMix.levels).join(' + ');
            document.getElementById('mix-of-day').innerHTML = `<div style="font-size:18px;font-weight:200;margin-bottom:4px">${topMix.name}</div><div class="card-sub">${layers} · ${topMix.plays || 0} plays</div>`;
        }

        document.getElementById('refresh').textContent = `last updated: ${new Date().toLocaleTimeString()}`;
    }

    loadAll();
    setInterval(loadAll, 30000);
    </script>
</body>
</html>
